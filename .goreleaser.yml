version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: workflow-plugin-actors
    main: ./cmd/workflow-plugin-actors
    binary: workflow-plugin-actors
    env:
      - CGO_ENABLED=0
      - GOPRIVATE=github.com/GoCodeAlone/*
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - plugin.json
      - LICENSE

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: GoCodeAlone
    name: workflow-plugin-actors
